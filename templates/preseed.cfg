# ============================================
# ARCHIVO PRESEED PARA DEVUAN ESFP CÓRDOBA
# Hardware: Notebooks escolares Intel + 4GB RAM
# Versión: PRODUCCIÓN FINAL CORREGIDA (VIM FIX)
# ============================================

# Silenciar el instalador y automatización radical
d-i debian-installer/priority critical
d-i debian-installer/allow_unauthenticated boolean true
d-i debian-installer/quiet boolean true
d-i debian-installer/splash boolean false

# --------------------
# IDIOMA Y LOCALIZACIÓN
# --------------------
d-i debian-installer/language string es
d-i debian-installer/country string AR
d-i debian-installer/locale string es_AR.UTF-8
d-i keyboard-configuration/xkb-keymap select es
d-i keyboard-configuration/layoutcode string es
d-i keyboard-configuration/modelcode string pc105
d-i console-setup/ask_detect boolean false
d-i console-setup/layoutcode string es
d-i clock-setup/utc boolean true
d-i time/zone string America/Argentina/Cordoba
d-i clock-setup/ntp boolean false

# CONFIGURACIÓN DE RED (MODO ESTÁNDAR V9)
d-i netcfg/enable boolean true
d-i mirror/country string manual
d-i mirror/http/hostname string
d-i mirror/http/directory string
d-i mirror/http/proxy string
d-i mirror/suite string excalibur

# --------------------
# CONFIGURACIÓN DE REPOSITORIOS (COMPLETA Y ROBUSTA)
# --------------------
# Definir componentes a habilitar (¡CLAVE!)
d-i apt-setup/components string main contrib non-free non-free-firmware

# Configuración del mirror principal (automático)
d-i mirror/country string auto
d-i mirror/http/hostname string auto
d-i mirror/http/directory string /merged
d-i mirror/http/proxy string
d-i mirror/suite string excalibur

# Activar mirrors online
d-i apt-setup/use_mirror boolean true

# Servicios adicionales (seguridad y updates)
d-i apt-setup/services-select multiselect security, updates
d-i apt-setup/security_host string auto
d-i apt-setup/security_path string /merged

# No incluir fuentes (deb-src) para ahorrar espacio
d-i apt-setup/enable-source-repositories boolean false

# Repositorio local complementario (prioritario)
d-i apt-setup/local0/repository string \
    deb file:///cdrom excalibur main contrib non-free non-free-firmware
d-i apt-setup/local0/comment string "ESFP Cordoba Local Repo"
d-i apt-setup/local0/source boolean false

# Configurar mirrors de seguridad y updates (oficiales)
d-i apt-setup/security_host string deb.devuan.org
d-i apt-setup/security_path string /merged
d-i apt-setup/non-free boolean true
d-i apt-setup/contrib boolean true
d-i apt-setup/non-free-firmware boolean true

# Activar servicios oficiales
d-i apt-setup/services-select multiselect security, updates

d-i base-installer/install-recommends boolean false

# El script customizar_iso.sh inyectará aquí los paquetes adicionales de pkgs.txt

# Evitar preguntas de tasksel
tasksel tasksel/desktop multiselect mate-desktop
tasksel tasksel/first multiselect mate-desktop
d-i tasksel/display-first boolean false

# No actualizar paquetes automáticamente
d-i pkgsel/upgrade select none

# Inyección de paquetes (Cerebro + Extras)
d-i pkgsel/include string esfp-custom-meta vim-tiny rsyslog __PAQUETES__

# --------------------
# OPCIONES DE KERNEL
# --------------------
d-i debian-installer/add-kernel-opts string loglevel=3 mitigations=off

# --------------------
# CREACIÓN DE USUARIO
# --------------------
d-i passwd/user-fullname string Alumno ESFP
d-i passwd/username string alumno
d-i passwd/user-password-crypted password $6$IR/Au8DMZL5ZShR/$GuuM2RrVJircVK3mGxdYG9nhdWvEUPTWR0QIobpIbuLkgWTjWWPSAqb2WgN.BD/6nxwTDRuYXXjhIowI2ndVt1
# Contraseña en hash (generada con mkpasswd)
# Verificación eliminada por usar hash

d-i passwd/root-login boolean false
d-i passwd/root-password-crypted password *
d-i passwd/root-password-again-crypted password *

# --------------------
# CONFIGURACIÓN DE GRUB
# --------------------
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean false
d-i grub-installer/bootdev string /dev/sda

# --------------------
# POST-INSTALACIÓN UNIFICADO
# --------------------
# El script postinst.sh ya fue copiado a /target/root/ por el script de finish-install
d-i preseed/late_command string \
    cp /rc.conf /target/etc/rc.conf ; \
    in-target /root/postinst.sh

# --------------------
# FINALIZACIÓN
# --------------------
d-i finish-install/reboot_in_progress note